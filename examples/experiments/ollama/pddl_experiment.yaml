metadata: {}
configurations:

    agentic-cypher-pddl:
        dsg_interface:
            dsg_interface_type: none

        pipeline: agentic
        phases:
            main:
                client:
                    client_type: ollama

                model_info:
                    model: gemma4:26b #gemma3:27b
                    temperature: 0.2
                    seed: 123

                agent_info:
                    prompt_settings:
                        base_prompt: $HERACLES_AGENTS_PATH/examples/prompts/cypher/pddl_agentic_cypher_prompt.yaml
                        #base_prompt: $HERACLES_AGENTS_PATH/examples/prompts/custom_ollama/pddl_agentic_cypher_prompt.yaml
                        output_type: PDDL
                    tools:
                        - name: run_cypher_query
                          bound_args:
                              dsgdb_conf:
                                  dsg_interface_type: heracles
                                  uri: neo4j://$ADT4_HERACLES_IP:$ADT4_HERACLES_PORT
                    tool_interface: ollama #custom
                    max_iterations: 5

        questions: $HERACLES_AGENTS_PATH/examples/questions/pddl_questions.yaml