metadata: {}
configurations:

    feedforward-cypher-qa:
        dsg_interface:
            dsg_interface_type: heracles
            uri: neo4j://$ADT4_HERACLES_IP:$ADT4_HERACLES_PORT

        pipeline: feedforward_cypher
        phases:
            generate-cypher:
                client:
                    client_type: ollama

                model_info:
                    model: gemma3:27b
                    temperature: 0.02

                agent_info:
                    prompt_settings:
                        base_prompt: $HERACLES_AGENTS_PATH/examples/prompts/custom_ollama/qa_feedforward_cypher_prompt.yaml
                    tools:
                        - name: run_cypher_query
                          bound_args:
                              dsgdb_conf:
                                  dsg_interface_type: heracles
                                  uri: neo4j://$ADT4_HERACLES_IP:$ADT4_HERACLES_PORT
                    tool_interface: custom
                    max_iterations: 5

            refine:
                client:
                    client_type: ollama

                model_info:
                    model: gemma3:27b
                    temperature: 0.02

                agent_info:
                    prompt_settings:
                        base_prompt: $HERACLES_AGENTS_PATH/examples/prompts/cypher/qa_feedforward_refinement_cypher_prompt.yaml
                        output_type: SLDP
                        sldp_answer_type_hint: true
                    tools: []
                    tool_interface: none
                    max_iterations: 1

        questions: $HERACLES_AGENTS_PATH/examples/questions/qa_questions.yaml
