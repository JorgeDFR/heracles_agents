metadata: {}
configurations:

    canary:
        dsg_interface:
            dsg_interface_type: none

        pipeline: canary
        phases:
            main:
                client:
                    client_type: ollama

                model_info:
                    model: gemma3:27b
                    temperature: 0.02

                agent_info:
                    prompt_settings:
                        base_prompt: $HERACLES_AGENTS_PATH/examples/prompts/canary_prompt.yaml
                        output_type: SLDP
                        sldp_answer_type_hint: true
                    tools:
                        - name: calculator
                        - name: ask_favog
                    tool_interface: custom
                    max_iterations: 5

        questions: $HERACLES_AGENTS_PATH/examples/questions/canary_questions.yaml