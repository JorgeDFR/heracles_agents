metadata: {}
configurations:

    canary:
        dsg_interface:
            dsg_interface_type: none

        pipeline: canary
        phases:
            main:
                client:
                    client_type: ollama #openai
                    #timeout: 20

                model_info:
                    model: gemma3:27b #gpt-4.1-nano
                    temperature: 0.02 #0.2
                    #seed: 123

                agent_info:
                    prompt_settings:
                        base_prompt: $HERACLES_AGENTS_PATH/examples/prompts/canary_prompt.yaml
                    tools:
                        - name: calculator
                        - name: ask_favog
                    max_iterations: 5
                    tool_interface: custom #openai

        questions: $HERACLES_AGENTS_PATH/examples/questions/canary_questions.yaml