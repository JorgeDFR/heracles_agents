metadata: {}
configurations:

    feedforward-cypher-qa:
        dsg_interface:
            dsg_interface_type: heracles
            uri: neo4j://neo4j:7683

        pipeline: feedforward_cypher
        phases:
            generate-cypher:
                client:
                    client_type: ollama

                model_info:
                    model: gemma3:27b
                    temperature: 0.02

                agent_info:
                    prompt_settings:
                        base_prompt: $HERACLES_AGENTS_PATH/examples/prompts/cypher/dsg_feedforward_cypher_prompt.yaml
                    tools: []
                    tool_interface: none
                    max_iterations: 1

            refine:
                client:
                    client_type: ollama

                model_info:
                    model: gemma3:27b
                    temperature: 0.02

                agent_info:
                    prompt_settings:
                        base_prompt: $HERACLES_AGENTS_PATH/examples/prompts/cypher/dsg_feedforward_refinement_cypher_prompt.yaml
                        output_type: SLDP
                        sldp_answer_type_hint: true
                    tools: []
                    tool_interface: none
                    max_iterations: 1

        questions: $HERACLES_AGENTS_PATH/examples/questions/qa_questions.yaml
