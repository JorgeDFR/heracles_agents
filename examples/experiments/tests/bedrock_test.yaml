metadata: {}
configurations:

    agentic-canary-qa:
        dsg_interface:
            dsg_interface_type: none

        pipeline: canary
        phases:
            main:
                client:
                    client_type: bedrock
                    timeout: 20

                model_info:
                    model: bedrock_claude-3-haiku #bedrock_claude-4-sonnet | bedrock_claude-opus-4-1
                    temperature: 0.2
                    seed: 123

                agent_info:
                    prompt_settings:
                        base_prompt: $HERACLES_AGENTS_PATH/examples/prompts/canary_prompt.yaml
                        output_type: SLDP
                        sldp_answer_type_hint: true
                    tools:
                        - name: calculator
                        - name: ask_favog
                    tool_interface: custom
                    max_iterations: 5

        questions: $HERACLES_AGENTS_PATH/examples/questions/canary_questions.yaml
