metadata: {}
configurations:

    feedforward-cypher-pddl:
        dsg_interface:
            dsg_interface_type: heracles
            uri: neo4j://neo4j:7683

        pipeline: feedforward_cypher
        phases:
            generate-cypher:
                client:
                    client_type: openai
                    # auth key is supplied by HERACLES_OPENAI_API_KEY
                    timeout: 20

                model_info:
                    model: gpt-4.1-nano
                    temperature: 0.2
                    seed: 123

                agent_info:
                    prompt_settings:
                        base_prompt: $HERACLES_AGENTS_PATH/examples/prompts/cypher/pddl_feedforward_system_cypher_prompt.yaml
                    tools: []
                    tool_interface: openai
                    max_iterations: 1

            refine:
                client:
                    client_type: openai
                    timeout: 20

                model_info:
                    model: gpt-4.1-nano
                    temperature: 0.2
                    seed: 123

                agent_info:
                    prompt_settings:
                        base_prompt: $HERACLES_AGENTS_PATH/examples/prompts/cypher/pddl_feedforward_refinement_system_cypher_prompt.yaml
                        output_type: PDDL
                    tools: []
                    tool_interface: openai
                    max_iterations: 1

        questions: $HERACLES_AGENTS_PATH/examples/questions/pddl_questions.yaml
