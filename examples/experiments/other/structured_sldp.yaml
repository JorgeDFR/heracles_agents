metadata: {}
configurations:

    feedforward-cypher-qa:
        dsg_interface:
            dsg_interface_type: heracles
            uri: neo4j://neo4j:7683

        pipeline: feedforward_cypher
        phases:
            generate-cypher:
                client:
                    client_type: openai
                    timeout: 20

                model_info:
                    model: gpt-5-mini
                    temperature: 1.0
                    seed: 123

                agent_info:
                    prompt_settings:
                        base_prompt: $HERACLES_AGENTS_PATH/examples/prompts/cypher/dsg_feedforward_prompt.yaml
                    tools: []
                    tool_interface: openai
                    max_iterations: 1

            refine:
                client:
                    client_type: openai
                    timeout: 20

                model_info:
                    model: gpt-5-mini
                    temperature: 1.0
                    seed: 123

                agent_info:
                    prompt_settings:
                        base_prompt: $HERACLES_AGENTS_PATH/examples/prompts/cypher/dsg_feedforward_refinement_prompt.yaml
                        output_type: SLDP_TOOL
                        sldp_answer_type_hint: true
                    tools:
                        - name: sldp_answer_tool
                    tool_interface: openai
                    max_iterations: 1

        questions: $HERACLES_AGENTS_PATH/src/heracles_agents/questions/qa_questions.yaml
