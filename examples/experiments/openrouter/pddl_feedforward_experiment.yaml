metadata: {}
configurations:

    feedforward-cypher-pddl:
        dsg_interface:
            dsg_interface_type: heracles
            uri: neo4j://$ADT4_HERACLES_IP:$ADT4_HERACLES_PORT

        pipeline: feedforward_cypher
        phases:
            generate-cypher:
                client:
                    client_type: openrouter

                model_info:
                    model: google/gemma-4-26b-a4b-it
                    temperature: 0.2
                    seed: 123

                agent_info:
                    prompt_settings:
                        base_prompt: $HERACLES_AGENTS_PATH/examples/prompts/cypher/pddl_feedforward_cypher_prompt.yaml
                    tools:
                        - name: run_cypher_query
                          bound_args:
                              dsgdb_conf:
                                  dsg_interface_type: heracles
                                  uri: neo4j://$ADT4_HERACLES_IP:$ADT4_HERACLES_PORT
                    tool_interface: openrouter
                    max_iterations: 5

            refine:
                client:
                    client_type: openrouter

                model_info:
                    model: google/gemma-4-26b-a4b-it:free
                    temperature: 0.2
                    seed: 123

                agent_info:
                    prompt_settings:
                        base_prompt: $HERACLES_AGENTS_PATH/examples/prompts/cypher/pddl_feedforward_refinement_cypher_prompt.yaml
                        output_type: PDDL
                    tools: []
                    tool_interface: none
                    max_iterations: 1

        questions: $HERACLES_AGENTS_PATH/examples/questions/pddl_questions.yaml