metadata: {}
configurations:

    agentic-cypher-qa:
        dsg_interface:
            dsg_interface_type: none

        pipeline: agentic
        phases:
            main:
                client:
                    client_type: openrouter

                model_info:
                    model: google/gemma-4-26b-a4b-it
                    temperature: 0.2
                    seed: 123

                agent_info:
                    prompt_settings:
                        base_prompt: $HERACLES_AGENTS_PATH/examples/prompts/cypher/qa_agentic_cypher_prompt.yaml
                        output_type: SLDP
                        sldp_answer_type_hint: true
                    tools:
                        - name: run_cypher_query
                          bound_args:
                              dsgdb_conf:
                                  dsg_interface_type: heracles
                                  uri: neo4j://$ADT4_HERACLES_IP:$ADT4_HERACLES_PORT
                    tool_interface: openrouter
                    max_iterations: 5

        questions: $HERACLES_AGENTS_PATH/examples/questions/qa_questions.yaml